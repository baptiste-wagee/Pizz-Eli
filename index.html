<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIZZ'ELI</title>

    <link rel="stylesheet" href="css/index.css">

    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Logo -->
<div id="logo-container">PIZZ'ELI 🍕</div>

<!-- Navigation -->
<nav id="navbar">
    <ul>
        <li><a href="#">Accueil</a></li>
        <li><a href="#menu">Carte</a></li>
        <li><a href="#contact">Contact</a></li>
    </ul>
</nav>

<!-- Hero -->
<header id="hero">
    <div class="hero-content">
        <p>L'authentique pizza napolitaine livrée chez vous.</p>
        <a href="#menu" class="scroll">↓</a>
    </div>
</header>

<main>

    <!-- ===================== MENU ===================== -->

    <section id="menu">

        <h2>Notre Carte</h2>

        <!-- Onglets -->

        <div class="menu-tabs">

            <button class="tab active" data-tab="pizzas">
                🍕 Pizzas
            </button>

            <button class="tab" data-tab="desserts">
                🍰 Desserts
            </button>

            <button class="tab" data-tab="boissons">
                🥤 Boissons
            </button>

        </div>

        <!-- Le contenu sera rempli automatiquement -->

        <div id="menu-content"></div>

    </section>

    <!-- ===================== CONTACT ===================== -->

    <section id="contact">

        <h2>Contact</h2>

        <p>Adresse • Téléphone • Horaires</p>

    </section>

</main>

<script src="JS/index.js"></script>

</body>
</html>
